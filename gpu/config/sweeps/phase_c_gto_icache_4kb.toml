# Auto-generated phase C sweep config
# TODO: ensure D$ geometry and LD/ST queue match the winners from phases A/B before running.
# Placeholder fixed D$ = 16KB 4B4W; scheduler=GTO; ldst_queue_size=32; I$=4096B.


# File paths for build tools and scripts
[paths]
assembler_script = "assembler/assembler.py"
opcodes = "assembler/opcodes.txt"
emulator = "src/emulator/src/emulator.py"
hex_bin_converter = "hex_bin_converter.py"

# Directory structure for test organization
[directories]
diff_dir = "results/test_diffs"
test_root_asm = "tests/assembly"
test_root_bin = "tests/bin"
expected_dir = "tests/exp"

# Output file locations for test results
[files]
raw_asm_output = "results/raw_instr.hex"
formatted_instr = "results/formatted_instr.hex"
meminit = "results/meminit.hex"
meminit_bin = "results/meminit.bin"
emu_output = "results/memgolden.hex"
emu_temp_output = "src/emulator/src/memsim.hex"
sim_output = "results/memsim.hex"
final_expected = "results/final_expected_combined.hex"
temp_cmd_log = "results/temp_command_output.txt"

# Default parameters for test execution
[test_parameters]
# Type: int, Default: 0
default_start_pc = 0

# Type: int, Range: 1-32 (must be power of 2)
# Number of threads per warp/block
default_threads = 1024

# Type: int, Range: 1+
# Number of thread blocks
default_blocks = 1

# Type: string, Options: "hex", "bin"
# Output format for memory dumps
format = "hex"

# Type: string
# Default glob pattern for test discovery
default_pattern = "*.s"

# ════════════════════════════════════════════════════════════════════════════
# STREAMING MULTIPROCESSOR (SM) CONFIGURATION
# ════════════════════════════════════════════════════════════════════════════

[sm]
# Type: int
# Streaming Multiprocessor number (for multi-SM configurations)
sm_no = 0

# Type: int, Range: 1-32
# Number of warps this SM can execute simultaneously
num_warps = 32

# Type: int
# Number of predicate registers for conditional execution
num_preds = 32

# Type: int, Options: 32
threads_per_warp = 32

# Type: bool
# Enable Thread Block Scheduler (TBS)
enable_tbs = true

# Type: hex address
# Base address where kernel code is loaded into memory
# Only read if enable_tbs = false, otherwise kernel entry point is read from MMIO
kernel_pointer_addr = 0xE7CE780C # NOTE: CHANGE KERNEL ARG POINTER FOR NON MMIO TEST CASES HERE 

# Type: int
# Number of threads in a thread block
tb_size = 32

# ════════════════════════════════════════════════════════════════════════════
# MEMORY-MAPPED I/O (MMIO) CONFIGURATION FOR THREAD BLOCK SCHEDULER
# ════════════════════════════════════════════════════════════════════════════
# Configuration for kernel launch parameters stored in MMIO when TBS is enabled.
# When enable_tbs = false, these values in config.toml are used.
# When enable_tbs = true, values are read from the meminit file at MMIO addresses:
#   0x0C: Kernel Entry Point
#   0x10: Threads Per Block  
#   0x14: Number of Blocks
#   0x18: Total Threads
#   0x1C: Kernel Arguments Address
#   0x20: Kernel Argument Size
# See: MMIO_details.md for more information

[mmio]
# Type: hex address, Default: 0x0
# Virtual address of kernel entry point
kernel_entry_point = 0x0

# Type: int, Default: 32
# Number of threads per block
threads_per_block = 32

# Type: int, Default: 1
# Number of blocks in the grid
num_blocks = 1

# Type: int, Default: 32
# Total threads across all blocks
total_threads = 32

# Type: hex address, Default: 0x20000000
# Virtual address of kernel arguments structure
# kernel_args_address = 0xE7CDDDB8 #DUPLICATE

# Type: int, Default: 0
# Size in bytes of kernel arguments to fetch
kernel_args_size = 0

# ════════════════════════════════════════════════════════════════════════════
# MEMORY SYSTEM CONFIGURATION
# ════════════════════════════════════════════════════════════════════════════

[memory]
# Type: hex address
# Starting program counter for instruction fetch
start_pc = 0x0

# Type: int
# Latency for memory operations
latency = 50

# Type: string, Options: "rr" (round-robin)
# Memory access arbitration policy
policy = "rr"

[kernel]
# Type: int
# Maximum number of concurrent kernels on this SM 
# Should be fixed to 1
max_kernels_per_sm = 1

# Type: hex address
# Location in memory where data writes and reads should start at
# kernel_id = 0xE7CDDDB8 DUPLICATE

# ════════════════════════════════════════════════════════════════════════════
# CACHE CONFIGURATION
# ════════════════════════════════════════════════════════════════════════════

[icache]
# Type: int (bytes)
# Instruction cache size in bytes
cache_size = 4096

# Type: int (bytes)
block_size = 4

# Type: int, Options: 1 (direct), 2, 4, 8 (associativity)
# Set associativity (1 = direct mapped, higher = more associativity)
associativity = 1

[dcache]
# Type: int (bytes)
# Data cache size in bytes
cache_size = 16384

# Type: int (bytes)
block_size = 4

# Type: int
associativity = 4
num_banks = 4
num_sets_per_bank = 8
num_ways = 4
block_size_words = 32
word_size_bytes = 4
uuid_size = 8
mshr_buffer_len = 16
hit_latency = 2
ram_latency_cycles = 200

# ════════════════════════════════════════════════════════════════════════════
# EXECUTION UNITS CONFIGURATION
# ════════════════════════════════════════════════════════════════════════════
# Controls the number and behavior of functional execution units.
# For detailed documentation, see CONFIG.md section: Functional Units

[functional_units]
# Type: int, Default: 1
# Number of integer execution units
int_unit_count = 1

# Type: int, Default: 1
# Number of floating-point execution units
fp_unit_count = 1

# Type: int, Default: 1
# Number of special function units (trigonometric, inv sqrt)
special_unit_count = 1

# Type: int, Default: 1
# Number of ldst/branch/jump execution units
membranchjump_unit_count = 1

# ─────────────────────────────────────────────────────────────────────────────
# Integer Execution Unit Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Configures ALU, multiply, and divide operations

[functional_units.int_unit]
# Type: int, Default: 1
# Number of integer ALUs (for ADD, SUB, AND, OR, XOR, etc.)
alu_count = 1

# Type: int, Default: 1
# Number of integer multiplier units (for MUL operations)
mul_count = 1

# Type: int, Default: 1
# Number of integer divider units (for DIV/DIVU operations)
div_count = 1

# Type: int, Default: 1
# Latency for integer ALU operations
alu_latency = 1

# Type: int, Default: 2
# Latency for integer multiply
mul_latency = 2

# Type: int, Default: 17
# Latency for integer divide
div_latency = 17

# ─────────────────────────────────────────────────────────────────────────────
# Floating-Point Execution Unit Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Configures FP ALU, multiply, divide, and square root operations

[functional_units.fp_unit]
# Type: int, Default: 1
# Number of floating-point ALUs (for FADD, FSUB, FMUL, etc.)
alu_count = 1

# Type: int, Default 1
# Number of floating-point multiplier units
mul_count = 1

# Type: int, Default: 1
# Number of floating-point divider units
div_count = 1

# Type: int, Default: 0 (no sqrt instruction atm)
# Number of square root units (SQRT operations)
sqrt_count = 0

# Type: int, Range: 1-3 (cycles)
# Latency for FP ALU operations
alu_latency = 1

# Type: int, Default: 4
# Latency for FP multiply
mul_latency = 4

# Type: int, Default: 24
# Latency for FP divide 
div_latency = 24

# Type: int, Default: 20
# Latency for square root operations
sqrt_latency = 20

# ─────────────────────────────────────────────────────────────────────────────
# Special Function Unit Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Configures trigonometric, inverse square root, and conversion operations

[functional_units.special_unit]
# Type: int, Default: 1
# Number of trigonometric function units (SIN, COS, TAN)
trig_count = 1

# Type: int, Default: 1
# Number of inverse square root units (RSQRT)
inv_sqrt_count = 1

# Type: int, Default: 1
# Number of format conversion units (FP<->INT, FLOAT->DOUBLE)
conv_count = 1

# Type: int, Default: 16
# Latency for trigonometric operations
trig_latency = 16

# Type: int, Default: 12
# Latency for inverse square root
inv_sqrt_latency = 12

# Type: int, Default: 1
# Latency for format conversions
conv_latency = 1

# ─────────────────────────────────────────────────────────────────────────────
# Memory/Branch/Jump Execution Unit Configuration
# ─────────────────────────────────────────────────────────────────────────────
# Configures load/store, branch, and jump operations

[functional_units.membranchjump_unit]
# Type: int, Default: 1
# Number of load/store units (for LW, SW, LB, SB operations)
ldst_count = 1

# Type: int, Default: 1
# Number of branch units (for conditional branches)
branch_count = 1

# Type: int, Default: 1
# Number of jump units (for unconditional jumps and JAL)
jump_count = 1

# Type: int, Default: 1
# Write-back buffer size for load/store results
ldst_buffer_size = 1

# Type: int, Default: 1
# Queue size for pending load/store operations
ldst_queue_size = 32

# ════════════════════════════════════════════════════════════════════════════
# WRITE-BACK STAGE CONFIGURATION
# ════════════════════════════════════════════════════════════════════════════
# Controls how results from execution units are written back to registers

[writeback.buffer_config]
# ─────────────────────────────────────────────────────────────────────────────
# Buffer Organization Scheme
# ─────────────────────────────────────────────────────────────────────────────

# Type: enum
# Options: "buffer_per_fsu" (one per functional subunit) | "buffer_per_bank" (one per register bank)
# Default: "buffer_per_fsu"
# Effect on system: Affects write-back bandwidth and result ordering
count_scheme = "buffer_per_fsu"

# Type: enum
# Options: "fixed" (uniform size) | "variable" (per-unit customizable)
# Default: "fixed"
# Use "variable" with variable_sizes table for custom per-unit sizes
size_scheme = "fixed"

# Type: enum
# Options: "queue" (FIFO) | "stack" (LIFO) | "circular" (wraparound)
# Default: "queue"
# Queue: Preserves instruction order, simple fairness
# Stack: LIFO ordering, might cause starvation
# Circular: Fixed memory, wraparound behavior
structure = "queue"

# ─────────────────────────────────────────────────────────────────────────────
# Eviction Policies
# ─────────────────────────────────────────────────────────────────────────────

# Type: enum
# Options: "capacity_priority" | "age_priority" | "fsu_priority"
# Default: "capacity_priority"
# Determines which result to evict when write-back buffer is full
# capacity_priority: Free up space immediately (oldest instruction)
# age_priority: Evict based on age (instruction latency)
# fsu_priority: Use FSU-specific priority settings (see fsu_priorities)
primary_policy = "capacity_priority"

# Type: enum
# Applied when primary_policy results in ties
secondary_policy = "age_priority"

# ─────────────────────────────────────────────────────────────────────────────
# Buffer Sizing
# ─────────────────────────────────────────────────────────────────────────────

# Type: int, Default: 8
# For fixed scheme: all buffers get this size
# For variable scheme: default size (overridable per-unit)
size = 8

# Type: table (optional, only for variable scheme)
# Format: { "unit_name": size_value, ... }
# Example (uncomment to use):
# variable_sizes = {
#     "Alu_int_0": 16,
#     "Mul_int_0": 8,
#     "Div_int_0": 4,
# }

# Type: table (optional, only for fsu_priority policy)
# Format: { "unit_name": priority_value, ... }
# Higher values = higher priority (less likely to be evicted)
# Example (uncomment to use):
# fsu_priorities = {
#     "Alu_int_0": 3,        # High priority - critical operations
#     "Mul_int_0": 2,        # Medium priority
#     "Div_int_0": 1,        # Low priority - infrequent long operations
# }

# ─────────────────────────────────────────────────────────────────────────────
# Register File Configuration
# ─────────────────────────────────────────────────────────────────────────────

[register_file]
# Type: int, Default: 2
# Number of independent register file banks
num_banks = 2

[predicate_register_file]
# Type: int, Range: 1
# Number of independent predicate register file banks
# Predicate registers are for conditional execution masks
num_banks = 1

# ════════════════════════════════════════════════════════════════════════════
# TEST CONFIGURATION
# ════════════════════════════════════════════════════════════════════════════

[test]
# Type: string
# Test file to load
test_file = "test.bin"

# Type: string, Options: "bin", "hex"
# Format of test file
test_file_type = "bin"

# Type: int
# Size of test block
tb_size = 32

# ════════════════════════════════════════════════════════════════════════════
# PERFORMANCE COUNTER CONFIGURATION
# ════════════════════════════════════════════════════════════════════════════
# Controls performance metrics collection and reporting

[perf_counter]
# Type: bool
# Default: true
# Enable/disable performance counter collection
enabled = true

# Type: bool
# Default: false
# Enable detailed instruction-level trace (generates large files)
trace_enabled = false

# Type: int
# Cycle at which to start tracing (only if trace_enabled = true)
trace_start_cycle = 0

# Type: int
# Cycle at which to stop tracing (0 = trace until end)
trace_end_cycle = 0

# Type: string (path)
# Default: "results/perf_data"
# Directory for performance counter output files
output_dir = "results/perf_data"

# Type: bool
# Default: true
# If true: only write summary statistics (faster, smaller files)
# If false: write all intermediate trace data
summary_only = true

# Type: array of strings
# Default: [] (empty = all units)
# List of execution units to monitor (empty = monitor all)
# Example: ["Alu_int_0", "Mul_int_0"]
enabled_units = []

# Type: int (entries)
# Default: 100000
# Maximum events to buffer before flushing to disk
# Lower = more frequent writes, higher memory usage
# Higher = less frequent writes, lower memory overhead
buffer_limit = 100000

# Type: bool
# Default: false
# Enable flight recorder (continuous circular buffer of recent events)
# Useful for debugging without storing entire trace
flight_recorder_enabled = false
